services:
  api:
    image: vincentoei/churney-api:${VERSION}
    container_name: churney-api
    ports:
      - "8000:8000"
    volumes:
      - ~/artifacts:/app/artifacts
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
